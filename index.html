<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link
      rel="preload"
      as="image"
      href="images/desktop.jpeg"
      type="image/jpeg"
    />

    <link rel="icon" href="/favicon.ico" />
    <meta property="og:title" content="Portfolio" />
    <meta
      property="og:description"
      content="Frontend developer experience with React.js, Javascript, TypeScript, CSS and SCSS, focused on creating user-friendly interfaces and exploring Next.js, Express.js, and MongoDB."
    />
    <meta property="og:image" content="images/portfolio.webp" />
    <meta
      property="og:url"
      content="https://frontend-craft-portfolio.netlify.app"
    />
    <meta property="og:type" content="website" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      ;(function () {
        const theme = localStorage.getItem("theme")
        const systemDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches

        if (theme === "dark" || (!theme && systemDark)) {
          document.documentElement.classList.add("dark")
        } else {
          document.documentElement.classList.remove("dark")
        }
      })()
    </script>

    <title>Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
